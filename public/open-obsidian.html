<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>打开 Obsidian</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; line-height: 1.6; color: #1f2328; }
    .wrap { max-width: 680px; margin: 0 auto; }
    a.button { display: inline-block; margin-top: 16px; padding: 12px 18px; border-radius: 8px; background: #2f6fed; color: #fff; text-decoration: none; font-weight: 600; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>正在打开 Obsidian</h1>
    <p>如果没有自动跳转，点击下面按钮。</p>
    <p><a id="open" class="button" href="#">打开对应笔记</a></p>
    <p>如果浏览器询问是否允许打开 Obsidian，请选择允许。</p>
  </div>

  <script>
    const links = {
      topic: "obsidian://open?vault=%E5%B0%8F%E7%BA%A2%E4%B9%A6%E9%AB%98%E7%AB%AF%E9%9B%8C%E7%AB%9E%E9%80%89%E9%A2%98%E5%BA%93&file=01_%E9%80%89%E9%A2%98%E6%80%BB%E8%A7%88",
      content: "obsidian://open?vault=%E5%B0%8F%E7%BA%A2%E4%B9%A6%E9%AB%98%E7%AB%AF%E9%9B%8C%E7%AB%9E%E9%80%89%E9%A2%98%E5%BA%93&file=02_%E5%86%85%E5%AE%B9%E7%B3%BB%E7%BB%9F%2F%E5%86%85%E5%AE%B9%E6%A0%8F%E7%9B%AE%E4%B8%8E%E9%80%89%E9%A2%98%E6%96%B9%E5%90%91",
      structure: "obsidian://open?vault=%E5%B0%8F%E7%BA%A2%E4%B9%A6%E9%AB%98%E7%AB%AF%E9%9B%8C%E7%AB%9E%E9%80%89%E9%A2%98%E5%BA%93&file=02_%E5%86%85%E5%AE%B9%E7%B3%BB%E7%BB%9F%2F%E7%AC%94%E8%AE%B0%E7%BB%93%E6%9E%84%E6%A8%A1%E6%9D%BF",
      review: "obsidian://open?vault=%E5%B0%8F%E7%BA%A2%E4%B9%A6%E9%AB%98%E7%AB%AF%E9%9B%8C%E7%AB%9E%E9%80%89%E9%A2%98%E5%BA%93&file=03_%E5%8F%91%E5%B8%83%E5%A4%8D%E7%9B%98",
      weekly: "obsidian://open?vault=%E5%B0%8F%E7%BA%A2%E4%B9%A6%E9%AB%98%E7%AB%AF%E9%9B%8C%E7%AB%9E%E9%80%89%E9%A2%98%E5%BA%93&file=03_%E6%B5%81%E9%87%8F%E5%A4%8D%E7%9B%98%2F%E5%91%A8%E5%A4%8D%E7%9B%98%E6%A8%A1%E6%9D%BF"
    };

    const target = new URLSearchParams(location.search).get("target") || "topic";
    const url = links[target] || links.topic;
    const openLink = document.getElementById("open");
    openLink.href = url;
    window.setTimeout(() => { location.href = url; }, 300);
  </script>
</body>
</html>
