name: Daily XHS Reminder

on:
  schedule:
    # 10:30 Asia/Shanghai.
    - cron: "30 2 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send XHS reminder to Feishu
        env:
          XHS_FEISHU_WEBHOOK_URL: ${{ secrets.XHS_FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$XHS_FEISHU_WEBHOOK_URL" ]; then
            echo "Missing GitHub secret: XHS_FEISHU_WEBHOOK_URL"
            exit 1
          fi

          printf '%s' '{"msg_type":"text","content":{"text":"小红书今日固定任务\n\n今天不选题，不改方向，只完成发布闭环。\n\n1. 从选题库选定今天 1 篇\n2. 写完正文初稿\n3. 做完封面\n4. 发布前检查：标题、封面、正文、评论钩子\n5. 发布笔记\n6. 晚上记录：浏览、点赞、收藏、评论、涨粉、私信/需求\n7. 写一句：今天这篇最值得复写的是？\n\n今天不重新定方向，不现场发散选题，不为了完美拖延发布。"}}' > payload.json

          curl --fail --silent --show-error \
            -X POST "$XHS_FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data-binary @payload.json
